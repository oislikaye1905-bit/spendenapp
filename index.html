<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spendenaktion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <img src="logo.png" class="logo" alt="Bachem Logo">

  <div class="container">
    <p class="tag">Spendenaktion</p>

    <h1>Aargauer Basler Diabeteslager für Kinder</h1>
    <p class="subtitle">Jeder Beitrag hilft und bringt uns weiter.</p>

    <div class="amount-card">
      <p class="amount-label">Aktueller Spendenbetrag</p>
      <div id="amount">0 CHF</div>
    </div>

    <div class="goal-row">
      <span>Letztes Jahr: 1'500 CHF</span>
      <span id="percentText">0%</span>
    </div>

    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>

    <div class="buttons">
      <button class="btn" onclick="changeAmount(10)">+10 CHF</button>
      <button class="btn reset" onclick="resetAmount()">Reset</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
